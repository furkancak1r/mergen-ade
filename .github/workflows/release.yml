name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable MSVC host)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc

      - name: Build portable release binary
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release.ps1

      - name: Package release zip
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $assetName = "mergen-ade-$tag-windows-x64-portable.zip"
          $staging = "release-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/mergen-ade.exe" "$staging/mergen-ade.exe" -Force
          if (Test-Path $assetName) { Remove-Item $assetName -Force }
          Compress-Archive -Path "$staging/*" -DestinationPath $assetName
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ${{ steps.package.outputs.asset_name }}
          if-no-files-found: error

  build-macos:
    name: Build macOS Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable macOS host)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Validate Apple signing secrets
        env:
          APPLE_DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          APPLE_NOTARY_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY_BASE64 }}
        run: |
          missing=0
          for name in \
            APPLE_DEVELOPER_ID_APP_CERT_BASE64 \
            APPLE_DEVELOPER_ID_APP_CERT_PASSWORD \
            APPLE_DEVELOPER_IDENTITY \
            APPLE_NOTARY_API_KEY_ID \
            APPLE_NOTARY_API_ISSUER_ID \
            APPLE_NOTARY_API_PRIVATE_KEY_BASE64
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Validate Apple signing toolchain
        run: |
          xcode-select -p
          which codesign
          which security
          xcrun --find notarytool
          xcrun --find stapler

      - name: Build macOS ARM64 binary
        id: build
        run: cargo +stable build --release --target aarch64-apple-darwin

      - name: Prepare Apple signing credentials
        id: apple-credentials
        env:
          APPLE_DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY_BASE64 }}
        run: |
          keychain_path="$RUNNER_TEMP/mergen-release.keychain-db"
          cert_path="$RUNNER_TEMP/developer-id-application.p12"
          notary_key_path="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_API_KEY_ID}.p8"
          keychain_password="$(openssl rand -hex 16)"

          printf '%s' "${APPLE_DEVELOPER_ID_APP_CERT_BASE64}" | base64 --decode > "${cert_path}"
          printf '%s' "${APPLE_NOTARY_API_PRIVATE_KEY_BASE64}" | base64 --decode > "${notary_key_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${cert_path}" \
            -k "${keychain_path}" \
            -P "${APPLE_DEVELOPER_ID_APP_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"
          existing_keychains="$(security list-keychains -d user | tr -d '"' | xargs)"
          security list-keychains -d user -s "${keychain_path}" ${existing_keychains}
          security default-keychain -d user -s "${keychain_path}"

          {
            echo "keychain_path=${keychain_path}"
            echo "cert_path=${cert_path}"
            echo "notary_key_path=${notary_key_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: Package signed and notarized DMG
        id: package
        env:
          MACOS_SIGN_AND_NOTARIZE: "1"
          MACOS_BUNDLE_ID: com.mergen.MergenADE
          MACOS_CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          MACOS_NOTARY_KEY_PATH: ${{ steps.apple-credentials.outputs.notary_key_path }}
        run: bash ./scripts/package-macos-release.sh "${{ github.ref_name }}"

      - name: Upload macOS notarization diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-notarization-diagnostics
          path: |
            release-staging/macos/notary-submit.json
            release-staging/macos/notary-detail.json
          if-no-files-found: ignore

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

      - name: Clean up Apple signing credentials
        if: always()
        run: |
          rm -f "${{ steps.apple-credentials.outputs.cert_path }}"
          rm -f "${{ steps.apple-credentials.outputs.notary_key_path }}"
          if [ -n "${{ steps.apple-credentials.outputs.keychain_path }}" ] && [ -f "${{ steps.apple-credentials.outputs.keychain_path }}" ]; then
            security delete-keychain "${{ steps.apple-credentials.outputs.keychain_path }}" || true
          fi

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: needs.build-windows.result == 'success' && needs.build-macos.result == 'success'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Show packaged assets
        run: ls -al release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable MSVC host)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc

      - name: Build portable release binary
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release.ps1

      - name: Package release zip
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $assetName = "mergen-ade-$tag-windows-x64-portable.zip"
          $staging = "release-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/mergen-ade.exe" "$staging/mergen-ade.exe" -Force
          if (Test-Path $assetName) { Remove-Item $assetName -Force }
          Compress-Archive -Path "$staging/*" -DestinationPath $assetName
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ${{ steps.package.outputs.asset_name }}
          if-no-files-found: error

  build-macos:
    name: Build macOS Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable macOS host)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Build macOS ARM64 binary
        id: build
        run: cargo +stable build --release --target aarch64-apple-darwin

      - name: Package unsigned DMG
        id: package
        run: bash ./scripts/package-macos-release.sh "${{ github.ref_name }}"

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: needs.build-windows.result == 'success' && needs.build-macos.result == 'success'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Show packaged assets
        run: ls -al release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable MSVC host)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc

      - name: Build portable release binary
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release.ps1

      - name: Package release zip
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $assetName = "mergen-ade-$tag-windows-x64-portable.zip"
          $staging = "release-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/mergen-ade.exe" "$staging/mergen-ade.exe" -Force
          if (Test-Path $assetName) { Remove-Item $assetName -Force }
          Compress-Archive -Path "$staging/*" -DestinationPath $assetName
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          overwrite_files: true
